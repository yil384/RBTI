<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1440px;
    background: linear-gradient(135deg, #f0f0ff 0%, #e8e8ff 50%, #f5f0ff 100%);
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Background doodles */
  .bg-emoji {
    position: absolute;
    font-size: 3rem;
    opacity: 0.06;
  }

  .badge {
    background: #6366f1;
    color: white;
    padding: 12px 32px;
    border-radius: 999px;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 48px;
  }

  h1 {
    font-size: 96px;
    font-weight: 900;
    color: #1e1e3f;
    letter-spacing: -3px;
    margin-bottom: 16px;
  }

  h1 span {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 42px;
    color: #4a4a6a;
    font-weight: 600;
    margin-bottom: 60px;
    text-align: center;
    line-height: 1.5;
  }

  .stats {
    display: flex;
    gap: 48px;
    margin-bottom: 60px;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-size: 72px;
    font-weight: 900;
    color: #6366f1;
    line-height: 1;
  }

  .stat-label {
    font-size: 26px;
    color: #6a6a8a;
    margin-top: 8px;
    font-weight: 500;
  }

  .fields {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    justify-content: center;
    max-width: 900px;
    margin-bottom: 60px;
  }

  .field-tag {
    background: white;
    border: 2px solid #e0e0f0;
    border-radius: 16px;
    padding: 14px 24px;
    font-size: 26px;
    color: #3a3a5a;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 4px 12px rgba(99,102,241,0.06);
  }

  .bottom-text {
    font-size: 30px;
    color: #8a8aaa;
    font-weight: 500;
  }

  .url {
    font-size: 28px;
    color: #6366f1;
    font-weight: 700;
    margin-top: 16px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <!-- Background emojis -->
  <span class="bg-emoji" style="top:5%;left:8%;transform:rotate(-15deg)">🧬</span>
  <span class="bg-emoji" style="top:12%;right:10%;transform:rotate(20deg)">💻</span>
  <span class="bg-emoji" style="top:30%;left:5%;transform:rotate(-8deg)">🔬</span>
  <span class="bg-emoji" style="top:45%;right:6%;transform:rotate(12deg)">📊</span>
  <span class="bg-emoji" style="top:60%;left:12%;transform:rotate(18deg)">🧪</span>
  <span class="bg-emoji" style="top:75%;right:8%;transform:rotate(-10deg)">📐</span>
  <span class="bg-emoji" style="top:85%;left:6%;transform:rotate(5deg)">⚖️</span>
  <span class="bg-emoji" style="top:20%;left:45%;transform:rotate(-5deg)">🎓</span>
  <span class="bg-emoji" style="bottom:10%;right:15%;transform:rotate(15deg)">🎨</span>
  <span class="bg-emoji" style="top:50%;left:3%;transform:rotate(-20deg)">⚙️</span>
  <span class="bg-emoji" style="bottom:25%;left:40%;transform:rotate(8deg)">🏗️</span>

  <div class="badge">RBTI 2.0</div>
  <h1><span>562</span>种科研人格</h1>
  <div class="subtitle">10大学科 · 20道题 · 2分钟</div>

  <div class="stats">
    <div class="stat">
      <div class="stat-num">10</div>
      <div class="stat-label">学科覆盖</div>
    </div>
    <div class="stat">
      <div class="stat-num">562</div>
      <div class="stat-label">人格类型</div>
    </div>
    <div class="stat">
      <div class="stat-num">2</div>
      <div class="stat-label">分钟测完</div>
    </div>
  </div>

  <div class="fields">
    <div class="field-tag">💻 CS</div>
    <div class="field-tag">🧬 生物</div>
    <div class="field-tag">⚙️ 机械</div>
    <div class="field-tag">🧪 物化材</div>
    <div class="field-tag">🏗️ 土木</div>
    <div class="field-tag">📊 商科</div>
    <div class="field-tag">📐 数学</div>
    <div class="field-tag">⚖️ 人文</div>
    <div class="field-tag">🎨 艺术</div>
  </div>

  <div class="bottom-text">MBTI过时了，测测你的科研人格</div>
  <div class="url">rbti.picasso-lab.com</div>
</body>
</html>
