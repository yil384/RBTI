<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1440px;
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
  }

  h1 {
    font-size: 88px;
    font-weight: 900;
    margin-bottom: 32px;
    letter-spacing: -2px;
  }

  .sub {
    font-size: 38px;
    opacity: 0.9;
    margin-bottom: 64px;
    line-height: 1.6;
  }

  .url-box {
    background: rgba(255,255,255,0.2);
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 20px;
    padding: 24px 56px;
    font-size: 36px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 48px;
  }

  .cta {
    font-size: 32px;
    opacity: 0.85;
    margin-bottom: 80px;
  }

  .credits {
    font-size: 22px;
    opacity: 0.6;
    line-height: 2;
  }

  .emoji-row {
    font-size: 3rem;
    margin-bottom: 48px;
    letter-spacing: 16px;
  }
</style>
</head>
<body>
  <div class="emoji-row">💻 🧬 ⚙️ 🧪 🏗️ 📊 📐 ⚖️ 🎨</div>
  <h1>你是哪种<br>科研人格？</h1>
  <div class="sub">562种人格 · 10大学科<br>20道题 · 2分钟 · 手机直接测</div>
  <div class="url-box">rbti.picasso-lab.com</div>
  <div class="cta">测完评论区报你的人格！</div>
  <div class="credits">
    创作者：小红书@momo<br>
    灵感来源：B站@Q肉儿串儿
  </div>
</body>
</html>
